<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Annual Bible</title>

<link rel="manifest" href="manifest.json"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#0d1117;
  color:#e6edf3;
  font-family:Georgia, serif;
}

/* SPLASH */
#splash{
  position:fixed;
  inset:0;
  background:#0d1117;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  animation:fadeOut 1s ease forwards;
  animation-delay:2s;
}
@keyframes fadeOut{to{opacity:0;visibility:hidden;}}

/* HEADER */
.header{
  padding:20px;
}
.streak{
  color:#56d364;
  font-size:12px;
}

/* LISTA */
.day{
  padding:12px;
  margin:10px;
  border-radius:10px;
  background:#161b22;
  cursor:pointer;
}
.done{
  text-decoration:line-through;
  color:#56d364;
}

/* MENSAJE */
.msg{
  position:fixed;
  top:70px;
  left:50%;
  transform:translateX(-50%);
  background:#238636;
  padding:10px;
  border-radius:10px;
}

/* LIGHT MODE */
@media (prefers-color-scheme: light){
  body{background:#fff;color:#111;}
}
</style>
</head>

<body>

<div id="splash">
  <div>
    <h1>📖 Annual Bible</h1>
    <p>Plan de lectura en un año</p>
  </div>
</div>

<div class="header">
  <h1>📖 Annual Bible</h1>
  <div class="streak">🔥 Racha: <span id="streak">0</span> días</div>
</div>

<div id="list"></div>

<script>

// SERVICE WORKER
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}

// GENERAR PLAN SIMPLE (365 días)
const list=document.getElementById("list");
let completed=JSON.parse(localStorage.getItem("done")||"{}");

for(let i=1;i<=365;i++){
  const div=document.createElement("div");
  div.className="day"+(completed[i]?" done":"");
  div.innerText="Día "+i+" - Lectura bíblica";

  div.onclick=()=>{
    completed[i]=!completed[i];
    localStorage.setItem("done",JSON.stringify(completed));
    location.reload();
  };

  list.appendChild(div);
}

// RACHA
function getHoy(){
  return new Date().toISOString().split("T")[0];
}

function updateStreak(){
  let streak=parseInt(localStorage.getItem("streak")||"0");
  let lastDay=localStorage.getItem("lastDay");
  let hoy=getHoy();

  if(lastDay!==hoy){
    let ayer=new Date();
    ayer.setDate(ayer.getDate()-1);
    ayer=ayer.toISOString().split("T")[0];

    if(lastDay===ayer){streak++;}else{streak=1;}

    localStorage.setItem("streak",streak);
    localStorage.setItem("lastDay",hoy);
  }

  document.getElementById("streak").innerText=streak;
}

// MENSAJES
const mensajes=[
"Hoy es un buen día para acercarte a Dios 🙌",
"La constancia vale más que la perfección 💪",
"Cada día cuenta 🔥",
"Dios ve tu esfuerzo ❤️",
"Seguí firme 🙏"
];

function mensaje(){
  const m=mensajes[new Date().getDate()%mensajes.length];
  const div=document.createElement("div");
  div.className="msg";
  div.innerText=m;
  document.body.appendChild(div);
  setTimeout(()=>div.remove(),4000);
}

// NOTIFICACIÓN (solo cuando abrís la app)
function pedirPermiso(){
  if("Notification" in window){
    Notification.requestPermission();
  }
}

// INIT
updateStreak();
mensaje();
pedirPermiso();

// SPLASH REMOVE
setTimeout(()=>{
  const s=document.getElementById("splash");
  if(s) s.remove();
},3000);

</script>

</body>
</html>
