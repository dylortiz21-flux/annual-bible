<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Annual Bible</title>

<link rel="manifest" href="manifest.json"/>

<style>
body{
  margin:0;
  background:#0d1117;
  color:#e6edf3;
  font-family:Georgia, serif;
}

/* SPLASH */
#splash{
  position:fixed;
  inset:0;
  background:#0d1117;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  animation:fadeOut 1s ease forwards;
  animation-delay:2s;
}
@keyframes fadeOut{
  to{opacity:0;visibility:hidden;}
}

/* HEADER */
.header{
  padding:20px;
}
.streak{
  color:#56d364;
  font-size:12px;
}

/* MENSAJE */
.mensaje{
  position:fixed;
  top:70px;
  left:50%;
  transform:translateX(-50%);
  background:#238636;
  padding:10px;
  border-radius:10px;
  font-size:13px;
}

/* MODO CLARO AUTO */
@media (prefers-color-scheme: light){
  body{
    background:#fff;
    color:#111;
  }
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <div>
    <h1>📖 Annual Bible</h1>
    <p>Plan de lectura en un año</p>
  </div>
</div>

<div class="header">
  <h1>📖 Annual Bible</h1>
  <div class="streak">🔥 Racha: <span id="streak">0</span> días</div>
</div>

<script>
// =================
// SERVICE WORKER
// =================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}

// =================
// RACHA
// =================
function getHoy(){
  return new Date().toISOString().split("T")[0];
}

function updateStreak(){
  let streak = parseInt(localStorage.getItem("streak")||"0");
  let lastDay = localStorage.getItem("lastDay");
  let hoy = getHoy();

  if(lastDay !== hoy){
    let ayer = new Date();
    ayer.setDate(ayer.getDate()-1);
    ayer = ayer.toISOString().split("T")[0];

    if(lastDay === ayer){
      streak++;
    }else{
      streak = 1;
    }

    localStorage.setItem("streak", streak);
    localStorage.setItem("lastDay", hoy);
  }

  document.getElementById("streak").textContent = streak;
}

// =================
// MENSAJES
// =================
const mensajes=[
"Hoy es un buen día para acercarte a Dios 🙌",
"La constancia vale más que la perfección 💪",
"Cada día cuenta 🔥",
"Dios ve tu esfuerzo ❤️",
"Seguí firme 🙏",
"Tu disciplina hoy es tu recompensa mañana ✨"
];

function mostrarMensaje(){
  const hoy = new Date().getDate();
  const msg = mensajes[hoy % mensajes.length];

  const div=document.createElement("div");
  div.className="mensaje";
  div.innerText=msg;

  document.body.appendChild(div);
  setTimeout(()=>div.remove(),4000);
}

// =================
// NOTIFICACIÓN 7 AM
// =================
function pedirPermiso(){
  if("Notification" in window){
    Notification.requestPermission();
  }
}

function programarNotificacion(){
  if(Notification.permission !== "granted") return;

  function checkHora(){
    const now = new Date();
    if(now.getHours() === 7 && now.getMinutes() === 0){
      new Notification("📖 Annual Bible",{
        body:"Es hora de tu lectura 🙌"
      });
    }
  }

  setInterval(checkHora,60000);
}

// =================
// INIT
// =================
updateStreak();
mostrarMensaje();
pedirPermiso();
programarNotificacion();

// SPLASH REMOVE
setTimeout(()=>{
  const s=document.getElementById("splash");
  if(s) s.remove();
},3000);

</script>

</body>
</html>
